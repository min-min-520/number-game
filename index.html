<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>神经连击 · 极简挑战</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 首页特殊样式 */
    .home-container {
      text-align: center;
      padding: 40px 20px;
    }

    .home-title {
      font-size: 2.5rem;
      margin-bottom: 30px;
    }

    .home-subtitle {
      font-size: 1.2rem;
      color: #7fb4e0;
      margin-bottom: 50px;
      letter-spacing: 1px;
    }

    .start-btn {
      background: transparent;
      border: 2px solid #3ec2ff;
      color: #cce6ff;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 400;
      box-shadow: 0 0 20px #0099ff;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.15s;
      text-shadow: 0 0 5px #7fc9ff;
      letter-spacing: 2px;
    }

    .start-btn:active {
      background: #1a4466;
      border-color: #a0e0ff;
      box-shadow: 0 0 30px #3ec2ff;
      transform: translateY(3px);
    }

    .home-features {
      margin-top: 50px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .feature-item {
      font-size: 1rem;
      color: #8dc9ff;
    }

    /* 游戏玩法提示 */
    .game-rules {
      margin-top: 40px;
      padding: 20px;
      background: rgba(0, 20, 40, 0.4);
      border-radius: 16px;
      border: 1px solid rgba(64, 224, 255, 0.3);
      text-align: left;
    }

    .game-rules h3 {
      font-size: 1rem;
      color: #3ec2ff;
      margin-bottom: 12px;
      text-align: left;
      text-shadow: 0 0 10px #00aaff;
    }

    .game-rules ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .game-rules li {
      font-size: 0.85rem;
      color: #b0d8f0;
      line-height: 1.6;
      padding-left: 18px;
      position: relative;
    }

    .game-rules li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #3ec2ff;
    }

    @media (max-width: 420px) {
      .home-title { font-size: 2rem; }
      .start-btn { font-size: 1.1rem; padding: 12px 32px; }
      .game-rules { padding: 12px; }
      .game-rules h3 { font-size: 0.9rem; }
      .game-rules li { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="home-container">
    <h1 class="home-title">◈ 神经连击 ◈</h1>
    <p class="home-subtitle">考验你的反应速度与专注力</p>

    <button class="start-btn" id="startBtn">开始游戏</button>

    <div class="home-features">
      <div class="feature-item">⚡ 快速反应</div>
      <div class="feature-item">🎯 精准点击</div>
      <div class="feature-item">🧠 极限挑战</div>
    </div>

    <div class="game-rules">
      <h3>📖 游戏玩法</h3>
      <ul>
        <li>游戏开始后，屏幕会显示 5×5 的数字网格（1-25）</li>
        <li>你需要从 <strong>1</strong> 开始，按顺序依次点击到 <strong>25</strong></li>
        <li>限时 <strong>20 秒</strong>，看你能完成多少个数字</li>
        <li>点错不会扣分，但会浪费时间哦！</li>
      </ul>
    </div>
  </div>
</div>

<script>
  document.getElementById('startBtn').addEventListener('click', () => {
    window.location.href = 'game.html';
  });
</script>
</body>
</html>
